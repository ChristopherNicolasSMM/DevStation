{% extends "base.html" %}

{% block title %}Criar Tabela - DevStation{% endblock %}

{% block content %}
<div class="row">
    <div class="col-md-8">
        <div class="card">
            <div class="card-header">
                <h3>Criar Nova Tabela</h3>
            </div>
            <div class="card-body">
                <form method="POST" action="{{ url_for('admin.create_table') }}">
                    <div class="mb-3">
                        <label for="name" class="form-label">Nome da Tabela *</label>
                        <input type="text" class="form-control" id="name" name="name" required>
                        <small class="form-text text-muted">Nome descritivo da tabela</small>
                    </div>
                    <div class="mb-3">
                        <label for="description" class="form-label">Descrição</label>
                        <textarea class="form-control" id="description" name="description" rows="3"></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary">Criar Tabela</button>
                    <a href="{{ url_for('admin.tables') }}" class="btn btn-secondary">Cancelar</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
